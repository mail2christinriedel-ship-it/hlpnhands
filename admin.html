<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hlpnhands · Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1B2B5E; --navy-light: #2a3d7a; --navy-dim: rgba(27,43,94,0.08);
      --cream: #f5f0e8; --cream-dark: #ede6d6;
      --text: #1a1a2e; --text-muted: #6b6b8a;
      --white: #ffffff; --accent: #e8825a;
      --success: #2d8c6e; --danger: #c0392b;
      --radius: 14px; --radius-sm: 9px;
    }
    body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--navy);
    }
    .login-box {
      background: var(--cream); border-radius: var(--radius); padding: 2.5rem 2rem; width: 100%; max-width: 380px;
    }
    .login-box h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--navy); margin-bottom: 0.25rem; }
    .login-box p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.75rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .field label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    .field input { padding: 0.8rem 1rem; border: 1.5px solid var(--cream-dark); border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 0.95rem; background: var(--white); outline: none; }
    .field input:focus { border-color: var(--navy); }
    .btn-primary { width: 100%; padding: 0.9rem; background: var(--navy); color: var(--cream); border: none; border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .login-err { font-size: 0.8rem; color: var(--danger); margin-top: 0.75rem; text-align: center; min-height: 1.2em; }

    /* ADMIN LAYOUT */
    #admin-screen { display: none; min-height: 100vh; }
    .admin-topbar {
      background: var(--navy); padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .admin-topbar-left { display: flex; align-items: center; gap: 1rem; }
    .admin-logo { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--cream); }
    .admin-badge { background: var(--accent); color: white; font-size: 0.65rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-logout-top { background: rgba(245,240,232,0.12); border: none; color: var(--cream); font-family: 'Poppins', sans-serif; font-size: 0.8rem; padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; }

    .admin-tabs { background: var(--white); border-bottom: 1px solid var(--navy-dim); display: flex; padding: 0 2rem; gap: 0; }
    .admin-tab {
      padding: 1rem 1.5rem; border: none; background: transparent; font-family: 'Poppins', sans-serif;
      font-size: 0.85rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
    }
    .admin-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
    .tab-count { background: var(--cream-dark); color: var(--navy); font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 20px; }
    .tab-count.urgent { background: var(--accent); color: white; }

    .admin-content { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--navy); margin-bottom: 1.25rem; }

    /* CARDS */
    .card {
      background: var(--white); border-radius: var(--radius); border: 1px solid var(--navy-dim);
      margin-bottom: 1rem; overflow: hidden;
    }
    .card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--navy-dim); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .card-title { font-weight: 600; font-size: 0.95rem; color: var(--navy); margin-bottom: 0.2rem; }
    .card-sub { font-size: 0.78rem; color: var(--text-muted); }
    .card-body { padding: 1rem 1.25rem; font-size: 0.85rem; color: var(--text); line-height: 1.6; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem 1.25rem; background: var(--cream); border-top: 1px solid var(--navy-dim); }
    .meta-chip { font-size: 0.72rem; padding: 0.2rem 0.65rem; border-radius: 20px; background: var(--white); border: 1px solid var(--navy-dim); color: var(--text-muted); }
    .card-actions { padding: 0.75rem 1.25rem; display: flex; gap: 0.5rem; border-top: 1px solid var(--navy-dim); }
    .btn-approve { padding: 0.5rem 1.25rem; background: var(--success); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-reject { padding: 0.5rem 1.25rem; background: transparent; color: var(--danger); border: 1.5px solid rgba(192,57,43,0.3); border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-view { padding: 0.5rem 1.25rem; background: transparent; color: var(--navy); border: 1.5px solid var(--navy-dim); border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.4rem; }
    .status-dot.pending { background: var(--accent); }
    .status-dot.active { background: var(--success); }
    .status-dot.rejected { background: var(--danger); }

    /* USERS TABLE */
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th { text-align: left; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 0.75rem 1rem; background: var(--cream); border-bottom: 1px solid var(--navy-dim); }
    .users-table td { padding: 0.85rem 1rem; font-size: 0.85rem; border-bottom: 1px solid var(--navy-dim); vertical-align: middle; }
    .users-table tr:last-child td { border-bottom: none; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy); color: var(--cream); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 0.9rem; }

    /* MESSAGES */
    .msg-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--navy-dim); margin-bottom: 0.75rem; padding: 1.1rem 1.25rem; }
    .msg-from { font-size: 0.8rem; font-weight: 600; color: var(--navy); margin-bottom: 0.2rem; }
    .msg-post { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.6rem; }
    .msg-text { font-size: 0.88rem; color: var(--text); line-height: 1.6; background: var(--cream); padding: 0.75rem 1rem; border-radius: var(--radius-sm); }
    .msg-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.5rem; }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 0.5rem; }

    /* EMPTY */
    .empty { text-align: center; padding: 3rem 2rem; color: var(--text-muted); }
    .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty h3 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 0.4rem; }
    .empty p { font-size: 0.82rem; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
    .stat-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--navy-dim); padding: 1.25rem 1.5rem; }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--navy); line-height: 1; margin-bottom: 0.3rem; }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); }

    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--cream-dark); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--navy); color: var(--cream); padding: 0.65rem 1.25rem; border-radius: 24px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    @media (max-width: 600px) {
      .admin-content { padding: 1rem; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .admin-tabs { padding: 0 0.5rem; overflow-x: auto; }
      .admin-tab { padding: 1rem 0.75rem; font-size: 0.78rem; white-space: nowrap; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>hlpnhands</h1>
    <p>Admin-Bereich · Nur für dich</p>
    <div class="field"><label>E-Mail</label><input type="email" id="login-email" placeholder="deine@email.at" autocomplete="email"></div>
    <div class="field"><label>Passwort</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-primary" onclick="doLogin()">Anmelden</button>
    <p class="login-err" id="login-err"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-topbar">
    <div class="admin-topbar-left">
      <span class="admin-logo">hlpnhands</span>
      <span class="admin-badge">Admin</span>
    </div>
    <button class="btn-logout-top" onclick="doLogout()">Abmelden</button>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('posts')">
      Inserate <span class="tab-count urgent" id="count-pending">0</span>
    </button>
    <button class="admin-tab" onclick="switchTab('users')">
      Nutzer:innen <span class="tab-count" id="count-users">0</span>
    </button>
    <button class="admin-tab" onclick="switchTab('messages')">
      Nachrichten <span class="tab-count" id="count-messages">0</span>
    </button>
  </div>

  <div class="admin-content">

    <!-- POSTS TAB -->
    <div class="tab-panel active" id="panel-posts">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-pending">–</div><div class="stat-label">Warten auf Freigabe</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-active">–</div><div class="stat-label">Aktive Inserate</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-total">–</div><div class="stat-label">Inserate gesamt</div></div>
      </div>
      <div class="section-title">Warten auf Freigabe</div>
      <div id="posts-pending"><div class="loading"><div class="spinner"></div></div></div>
      <div class="section-title" style="margin-top:2rem;">Alle Inserate</div>
      <div id="posts-all"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- USERS TAB -->
    <div class="tab-panel" id="panel-users">
      <div class="section-title">Nutzer:innen</div>
      <div class="card">
        <div id="users-list"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- MESSAGES TAB -->
    <div class="tab-panel" id="panel-messages">
      <div class="section-title">Eingehende Nachrichten</div>
      <div id="messages-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://kteebaojjjnqlrlwfxdg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_f585xpjZ9-gPnAjdsGnWDw_bk_hMzXX';
const ADMIN_EMAIL = 'mail2christinriedel@gmail.com';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentTab = 'posts';

// ── AUTH ──────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!email || !pw) { err.textContent = 'Bitte beide Felder ausfüllen.'; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error || !data.user) { err.textContent = 'Anmeldung fehlgeschlagen.'; return; }
  if (data.user.email !== ADMIN_EMAIL) {
    await sb.auth.signOut();
    err.textContent = 'Kein Zugriff für diese E-Mail.';
    return;
  }
  currentUser = data.user;
  enterAdmin();
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  currentUser = null;
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user.email === ADMIN_EMAIL) {
    currentUser = session.user;
    enterAdmin();
  }
}

function enterAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadAll();
}

// ── TABS ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.admin-tab').forEach((t,i) => {
    const tabs = ['posts','users','messages'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── LOAD ALL ──────────────────────────────────────
async function loadAll() {
  await Promise.all([loadPosts(), loadUsers(), loadMessages()]);
}

// ── POSTS ─────────────────────────────────────────
async function loadPosts() {
  const { data: all } = await sb.from('posts').select('*').order('created_at', { ascending: false });
  if (!all) return;

  const pending = all.filter(p => !p.active);
  const active  = all.filter(p => p.active);

  // stats
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('stat-active').textContent  = active.length;
  document.getElementById('stat-total').textContent   = all.length;
  document.getElementById('count-pending').textContent = pending.length;

  // pending list
  const pendingEl = document.getElementById('posts-pending');
  if (pending.length === 0) {
    pendingEl.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><h3>Nichts wartet</h3><p>Alle Inserate sind bearbeitet.</p></div>`;
  } else {
    pendingEl.innerHTML = pending.map(p => renderPostCard(p, true)).join('');
  }

  // all posts
  const allEl = document.getElementById('posts-all');
  if (all.length === 0) {
    allEl.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Noch keine Inserate</h3></div>`;
  } else {
    allEl.innerHTML = all.map(p => renderPostCard(p, false)).join('');
  }
}

function renderPostCard(p, showApprove) {
  const typeLabel = p.type === 'angebot' ? '🤝 Angebot' : '🙋 Gesuch';
  const loc = [p.land, p.plz, p.location_name].filter(Boolean).join(' · ');
  const statusClass = p.active ? 'active' : 'pending';
  const statusLabel = p.active ? 'Freigegeben' : 'Ausstehend';
  return `
  <div class="card" id="post-${p.id}">
    <div class="card-header">
      <div>
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-sub">${typeLabel} · ${categoryLabel(p.category)} ${loc ? '· ' + esc(loc) : ''}</div>
      </div>
      <div style="font-size:0.78rem;color:var(--text-muted);white-space:nowrap;">
        <span class="status-dot ${statusClass}"></span>${statusLabel}
      </div>
    </div>
    ${p.description ? `<div class="card-body">${esc(p.description)}</div>` : ''}
    <div class="card-meta">
      <span class="meta-chip">📅 ${timeAgo(p.created_at)}</span>
      ${p.price ? `<span class="meta-chip">💶 ${esc(p.price)}</span>` : ''}
    </div>
    <div class="card-actions">
      ${showApprove ? `<button class="btn-approve" onclick="approvePost('${p.id}')">Freigeben ✓</button>` : ''}
      ${p.active ? `<button class="btn-reject" onclick="deactivatePost('${p.id}')">Deaktivieren</button>` : ''}
      <button class="btn-reject" onclick="deletePost('${p.id}')">Löschen</button>
    </div>
  </div>`;
}

async function approvePost(id) {
  const { error } = await sb.from('posts').update({ active: true }).eq('id', id);
  if (error) { showToast('Fehler: ' + error.message); return; }
  showToast('Inserat freigegeben ✓');
  loadPosts();
}

async function deactivatePost(id) {
  const { error } = await sb.from('posts').update({ active: false }).eq('id', id);
  if (error) { showToast('Fehler'); return; }
  showToast('Inserat deaktiviert');
  loadPosts();
}

async function deletePost(id) {
  if (!confirm('Inserat wirklich löschen?')) return;
  const { error } = await sb.from('posts').delete().eq('id', id);
  if (error) { showToast('Fehler'); return; }
  showToast('Gelöscht');
  loadPosts();
}

// ── USERS ─────────────────────────────────────────
async function loadUsers() {
  // Nutzer über profiles-Tabelle laden
  const { data: profiles } = await sb.from('profiles').select('*').order('created_at', { ascending: false });

  const count = profiles ? profiles.length : 0;
  document.getElementById('count-users').textContent = count;

  const el = document.getElementById('users-list');
  if (!profiles || profiles.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><h3>Noch keine Nutzer:innen</h3><p>Profile erscheinen hier sobald sich jemand registriert und Profildaten speichert.</p></div>`;
    return;
  }

  el.innerHTML = `
    <table class="users-table">
      <thead><tr>
        <th></th>
        <th>Name</th>
        <th>Ort</th>
        <th>Registriert</th>
      </tr></thead>
      <tbody>
        ${profiles.map(u => `
          <tr>
            <td><div class="user-avatar">${(u.name||'?').charAt(0).toUpperCase()}</div></td>
            <td><strong>${esc(u.name||'–')}</strong></td>
            <td>${esc([u.land, u.plz, u.city].filter(Boolean).join(' ')) || '–'}</td>
            <td>${timeAgo(u.created_at)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── MESSAGES ──────────────────────────────────────
async function loadMessages() {
  const { data } = await sb.from('messages').select('*, posts(title)').order('created_at', { ascending: false });

  const count = data ? data.length : 0;
  document.getElementById('count-messages').textContent = count;

  const el = document.getElementById('messages-list');
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><h3>Noch keine Nachrichten</h3><p>Eingehende Kontaktanfragen erscheinen hier.</p></div>`;
    return;
  }

  el.innerHTML = data.map(m => `
    <div class="msg-card" id="msg-${m.id}">
      <div class="msg-from">
        ${!m.read ? '<span class="unread-dot"></span>' : ''}
        ${esc(m.from_email || '–')}
      </div>
      <div class="msg-post">Re: ${esc(m.posts?.title || 'Inserat nicht gefunden')}</div>
      <div class="msg-text">${esc(m.message)}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.5rem;">
        <span class="msg-time">${timeAgo(m.created_at)}</span>
        ${!m.read ? `<button onclick="markRead('${m.id}')" style="background:none;border:none;font-size:0.75rem;color:var(--navy);font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600;text-decoration:underline;">Als gelesen markieren</button>` : '<span style="font-size:0.72rem;color:var(--success)">✓ Gelesen</span>'}
      </div>
    </div>`).join('');
}

async function markRead(id) {
  await sb.from('messages').update({ read: true }).eq('id', id);
  loadMessages();
}

// ── UTILS ─────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(d) {
  const diff = Math.floor((Date.now() - new Date(d)) / 1000);
  if (diff < 60) return 'gerade eben';
  if (diff < 3600) return Math.floor(diff/60) + ' Min.';
  if (diff < 86400) return Math.floor(diff/3600) + ' Std.';
  return Math.floor(diff/86400) + ' Tage';
}
function categoryLabel(c) {
  const m = { haushalt:'Haushalt & Garten', betreuung:'Betreuung', handwerk:'Handwerkliches', nachhilfe:'Nachhilfe & Wissen', beauty:'Beauty & Wellness', tausch:'Hilfe gegen Hilfe', gemeinnuetzig:'Gemeinnützig', sonstiges:'Sonstiges' };
  return m[c] || c || '–';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
